name: release

on:
  push:
    tags:
      - 'aegis-v*'
      - 'keystone86-aegis-v*'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create source archive
        run: |
          mkdir -p dist
          git archive --format=zip --output=dist/keystone86-source.zip HEAD
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keystone86-source
          path: dist/keystone86-source.zip
