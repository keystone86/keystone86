name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  bootstrap-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bootstrap report
        run: make bootstrap-report

  spec-and-namespace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Spec presence
        run: make spec-check
      - name: Frozen manifest
        run: make frozen-manifest-check
      - name: Namespace scaffold
        run: make namespace-check
      - name: Spec sync status
        run: make spec-sync-status

  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run codegen
        run: make codegen
      - name: Verify generated files are committed
        run: git diff --exit-code

  microcode-bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build placeholder microcode outputs
        run: make ucode

  decode-dispatch-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Decode/dispatch smoke
        run: make decode-dispatch-smoke

  microseq-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Microsequencer smoke
        run: make microseq-smoke

  commit-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Commit/ENDI smoke
        run: make commit-smoke

  service-abi-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Service ABI smoke
        run: make service-abi-smoke

  prefetch-decode-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prefetch/decode smoke
        run: make prefetch-decode-smoke

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Smoke sim
        run: make sim-smoke
